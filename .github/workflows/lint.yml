name: lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  python-syntax:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python syntax
        run: python -m py_compile src/app.py src/filters.py src/photos_saver.py
